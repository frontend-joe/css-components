<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Footers</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
      <footer>
        <div class="footer-inner">
          <div class="top">
            <div class="top-left">
            <img class="logo" src="logo.svg" />
              <p>
                Our mission is to empower lazy people to design and kickstart their startups with the least amount of effort.
              </p>
              <div class="links">
                <a>
                  About
                </a>
                <a>
                  Products
                </a>
                <a>
                  Services
                </a>
                <a>
                  Contact
                </a>
              </div>
            </div>
            <div class="buttons end">
              <button class="button" type="button">
                <img src="play.svg" />
                <span>
                  <span class="button-label"> Get it on </span>
                  <span class="button-title"> Google Play </span>
                </span>
              </button>
              <button class="button" type="button">
                <img src="apple.svg" />
                <span>
                  <span class="button-label"> Download on the </span>
                  <span class="button-title"> App Store </span>
                </span>
              </button>
            </div>
          </div>
          <div class="bottom">
            <p>Copyright 2026 © slothui. All rights reserved.</p>
            <div class="socials end">
              <a class="fa-brands fa-facebook"></a>
              <a class="fa-brands fa-x-twitter"></a>
              <a class="fa-brands fa-discord"></a>
              <a class="fa-brands fa-linkedin"></a>
            </div>
          </div>
        </div>
    </div>
  </body>
</html>
