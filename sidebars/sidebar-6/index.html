<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sidebars</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,700,1,0"
    />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/akar-icons-fonts"></script>
  </head>
  <body>
    <input type="checkbox" name="toggle" id="toggle" />
    <aside class="sidebar">
      <div class="header">
        <img src="logo.svg" class="logo" />
        <img src="logo-text.svg" class="logo-text" />
      </div>
      <nav>
        <button class="active" type="button">
          <i class="ai-home-alt1"></i>
          <p>Home</p>
        </button>
        <button type="button">
          <i class="ai-person"></i>
          <p>Contacts</p>
        </button>
        <button type="button">
          <i class="ai-shipping-box-v1"></i>
          <p>Automation</p>
        </button>
        <button type="button">
          <i class="ai-sparkles"></i>
          <p>Manychat AI</p>
        </button>
        <button type="button">
          <i class="ai-chat-dots has-badge"></i>
          <p>Inbox</p>
          <span class="badge">1</span>
        </button>
        <button type="button">
          <i class="ai-gear"></i>
          <p>Settings</p>
        </button>
        <label for="toggle">
          <span class="toggle-btn"></span>
        </label>
      </nav>
      <nav class="bottom">
        <button type="button">
          <img class="avatar" src="avatar.png" />
          <p>Profile</p>
        </button>
      </nav>
    </aside>
  </body>
</html>
